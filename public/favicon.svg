<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background matching Shadowdark theme -->
  <rect width="64" height="64" fill="#1a1a1a"/>

  <!-- Calendar icon -->
  <!-- Top bar (header) -->
  <rect x="12" y="16" width="40" height="8" fill="#d0d0d0" rx="2"/>

  <!-- Calendar body -->
  <rect x="12" y="24" width="40" height="28" fill="#2b2b2b" stroke="#d0d0d0" stroke-width="2" rx="2"/>

  <!-- Binding rings -->
  <rect x="20" y="12" width="3" height="8" fill="#d0d0d0" rx="1"/>
  <rect x="41" y="12" width="3" height="8" fill="#d0d0d0" rx="1"/>

  <!-- Grid dots for days -->
  <circle cx="20" cy="32" r="2" fill="#8b0000"/>
  <circle cx="28" cy="32" r="2" fill="#d0d0d0"/>
  <circle cx="36" cy="32" r="2" fill="#d0d0d0"/>
  <circle cx="44" cy="32" r="2" fill="#d0d0d0"/>

  <circle cx="20" cy="40" r="2" fill="#d0d0d0"/>
  <circle cx="28" cy="40" r="2" fill="#d0d0d0"/>
  <circle cx="36" cy="40" r="2" fill="#d0d0d0"/>
  <circle cx="44" cy="40" r="2" fill="#d0d0d0"/>
</svg>
